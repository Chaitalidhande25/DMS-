```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMS Support Portal - Raise a Case</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
        }

        .header {
            background: #0b5cab;
            color: white;
            text-align: center;
            padding: 20px;
            font-size: 28px;
            font-weight: bold;
        }

        .subheader {
            text-align: center;
            color: #555;
            margin: 10px 0 25px;
        }

        .container {
            width: 50%;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.15);
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        textarea {
            height: 120px;
            resize: vertical;
        }

        .btn {
            margin-top: 25px;
            width: 100%;
            background: #0b5cab;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        .btn:hover {
            background: #084b8a;
        }

        .footer {
            text-align: center;
            color: gray;
            margin-top: 20px;
            font-size: 13px;
        }
    </style>
</head>

<body>

<div class="header">
    Dealer Management System
</div>

<div class="subheader">
    Customer Support | Raise a Service Request
</div>

<div class="container">

<form action="https://webto.salesforce.com/servlet/servlet.WebToCase?encoding=UTF-8&orgId=00DdL00000ZaM7V"
      method="POST">

    <input type="hidden" name="orgid" value="00DdL00000ZaM7V">
    <input type="hidden" name="retURL" value="https://www.google.com">
    <input type="hidden" id="external" name="external" value="1">

    <label>Contact Name</label>
    <input type="text" name="name" maxlength="80" required>

    <label>Email</label>
    <input type="email" name="email" maxlength="80" required>

    <label>Phone</label>
    <input type="text" name="phone" maxlength="40">

    <label>Case Reason</label>
    <select name="reason" required>
        <option value="">-- Select --</option>
        <option>Defective Product</option>
        <option>Order Not Received</option>
        <option>Wrong Item Received</option>
        <option>Damaged Item Upon Arrival</option>
        <option>Return Request</option>
        <option>Exchange Request</option>
        <option>Warranty Claim</option>
        <option>Refund Processing</option>
        <option>Delayed Shipment</option>
        <option>Other</option>
    </select>

    <label>Priority</label>
    <select name="priority">
        <option>Low</option>
        <option>Medium</option>
        <option>High</option>
    </select>

    <label>Subject</label>
    <input type="text" name="subject" maxlength="80" required>

    <label>Description</label>
    <textarea name="description" required></textarea>

    <button class="btn" type="submit">
        Submit Case
    </button>

</form>

</div>

<div class="footer">
    © 2026 Dealer Management System | Customer Support Portal
</div>

</body>
</html>
