
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DMS Dealer Support Portal</title>

<style>
body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#eef2f7;
}

.container{
    max-width:800px;
    margin:40px auto;
    background:#fff;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 4px 15px rgba(0,0,0,.15);
}

.header{
    background:#163d6b;
    color:#fff;
    padding:20px;
    display:flex;
    align-items:center;
}

.logo{
    width:50px;
    height:50px;
    border-radius:8px;
    background:#ff9800;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:24px;
    font-weight:bold;
    margin-right:15px;
}

.header h2{
    margin:0;
}

.header p{
    margin:5px 0 0;
    font-size:14px;
}

.form{
    padding:30px;
}

.row{
    display:flex;
    gap:20px;
    margin-bottom:18px;
}

.col{
    flex:1;
}

label{
    display:block;
    font-weight:bold;
    margin-bottom:6px;
}

input,
select,
textarea{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:6px;
    box-sizing:border-box;
}

textarea{
    min-height:120px;
}

button{
    width:100%;
    padding:14px;
    background:#163d6b;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#0d2c50;
}

.footer{
    text-align:center;
    color:#666;
    padding:20px;
    font-size:13px;
}
</style>

</head>

<body>

<div class="container">

<div class="header">
<div class="logo">D</div>

<div>
<h2>DMS Dealer Support</h2>
<p>Submit your issue and our support team will contact you shortly.</p>
</div>
</div>

<div class="form">

<form action="https://webto.salesforce.com/servlet/servlet.WebToCase?encoding=UTF-8&orgId=00DdL00000ZaM7V" method="POST">

<input type="hidden" name="orgid" value="00DdL00000ZaM7V">

<input type="hidden" name="retURL"
value="https://chaitalidhande25.github.io/DMS-/ThankYou.html">

<input type="hidden" name="external" value="1">

<div class="row">

<div class="col">
<label>Contact Name</label>
<input type="text" id="name" name="name" maxlength="80" required>
</div>

<div class="col">
<label>Email</label>
<input type="email" id="email" name="email" maxlength="80" required>
</div>

</div>

<div class="row">

<div class="col">
<label>Phone</label>
<input type="text" id="phone" name="phone" maxlength="40">
</div>

<div class="col">
<label>Priority</label>
<select id="priority" name="priority">
<option value="">--Select--</option>
<option value="High">High</option>
<option value="Medium">Medium</option>
<option value="Low">Low</option>
</select>
</div>

</div>

<div class="row">

<div class="col">
<label>Case Reason</label>

<select id="reason" name="reason">
<option value="">--Select--</option>
<option value="Defective Product">Defective Product</option>
<option value="Order Not Received">Order Not Received</option>
<option value="Wrong Item Received">Wrong Item Received</option>
<option value="Damaged Item Upon Arrival">Damaged Item Upon Arrival</option>
<option value="Return Request">Return Request</option>
<option value="Exchange Request">Exchange Request</option>
<option value="Warranty Claim">Warranty Claim</option>
<option value="Refund Processing">Refund Processing</option>
<option value="Other">Other</option>
</select>

</div>

<div class="col">
<label>Subject</label>
<input type="text" id="subject" name="subject" maxlength="80" required>
</div>

</div>

<label>Description</label>

<textarea id="description"
name="description"
placeholder="Describe your issue here..."></textarea>

<br><br>

<button type="submit">
Submit Support Request
</button>

</form>

</div>

<div class="footer">
© 2026 Dealer Management System | Customer Support Portal
</div>

</div>

</body>
</html>
