
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DMS Dealer Support</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#eef2f7;
    padding:40px 15px;
}

.container{
    max-width:760px;
    margin:auto;
    background:#fff;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 5px 18px rgba(0,0,0,.15);
}

.header{
    background:#173b67;
    color:#fff;
    padding:22px 24px;
    display:flex;
    align-items:center;
}

.logo{
    width:36px;
    height:36px;
    background:#f4a328;
    border-radius:6px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    margin-right:14px;
}

.header h2{
    font-size:20px;
    margin-bottom:4px;
}

.header p{
    font-size:13px;
}

.form-area{
    padding:26px;
}

.section{
    margin-top:8px;
    margin-bottom:20px;
    padding-bottom:8px;
    border-bottom:1px solid #dcdcdc;
    font-size:13px;
    font-weight:bold;
    color:#173b67;
    text-transform:uppercase;
    letter-spacing:.5px;
}

.row{
    display:flex;
    gap:16px;
    margin-bottom:18px;
}

.col{
    flex:1;
}

.full{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:6px;
    font-size:13px;
    font-weight:bold;
}

input,
select,
textarea{
    width:100%;
    padding:11px;
    border:1px solid #ccd4df;
    border-radius:4px;
    font-size:14px;
}

textarea{
    min-height:120px;
    resize:vertical;
}

button{
    width:100%;
    background:#173b67;
    color:#fff;
    border:none;
    padding:14px;
    border-radius:4px;
    font-size:15px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#0f2f56;
}

.footer{
    text-align:center;
    margin-top:18px;
    color:#888;
    font-size:12px;
}
</style>

</head>
<body>

<div class="container">

<div class="header">
<div class="logo">D</div>

<div>
<h2>DMS Dealer Support</h2>
<p>Submit a support case — our team will respond promptly.</p>
</div>
</div>

<div class="form-area">

<form action="https://webto.salesforce.com/servlet/servlet.WebToCase?encoding=UTF-8&orgId=00DdL00000ZaM7V"
method="POST">

<input type="hidden" name="orgid" value="00DdL00000ZaM7V">

<input type="hidden"
name="retURL"
value="https://chaitalidhande25.github.io/DMS-/ThankYou.html">

<input type="hidden" name="external" value="1">

<div class="section">
YOUR DETAILS
</div>

<div class="row">

<div class="col">
<label>Contact Name *</label>
<input type="text" id="name" name="name" maxlength="80" required>
</div>

<div class="col">
<label>Phone Number</label>
<input type="text" id="phone" name="phone" maxlength="40">
</div>

</div>

<div class="full">
<label>Email Address *</label>
<input type="email" id="email" name="email" maxlength="80" required>
</div>

<div class="section">
CASE DETAILS
</div>

<div class="row">

<div class="col">
<label>Case Reason *</label>
<select id="reason" name="reason" required>
<option value="">-- Select Reason --</option>
<option value="Defective Product">Defective Product</option>
<option value="Order Not Received">Order Not Received</option>
<option value="Wrong Item Received">Wrong Item Received</option>
<option value="Damaged Item Upon Arrival">Damaged Item Upon Arrival</option>
<option value="Return Request">Return Request</option>
<option value="Exchange Request">Exchange Request</option>
<option value="Warranty Claim">Warranty Claim</option>
<option value="Refund Processing">Refund Processing</option>
<option value="Other">Other</option>
</select>
</div>

<div class="col">
<label>Priority *</label>
<select id="priority" name="priority" required>
<option value="">-- Select Priority --</option>
<option value="High">High</option>
<option value="Medium">Medium</option>
<option value="Low">Low</option>
</select>
</div>

</div>

<div class="full">
<label>Subject *</label>
<input type="text" id="subject" name="subject" maxlength="80" required>
</div>

<div class="full">
<label>Description *</label>
<textarea id="description"
name="description"
placeholder="Please describe your issue in detail..."
required></textarea>
</div>

<button type="submit">
Submit Case →
</button>

<div class="footer">
Our support team will respond as soon as possible.
</div>

</form>

</div>

</div>

</body>
</html>
