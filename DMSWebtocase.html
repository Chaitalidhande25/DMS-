
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-type" content="text/html; charset=UTF-8">
    <title>DMS Dealer Support</title>
</head>

<body>

<form action="https://webto.salesforce.com/servlet/servlet.WebToCase?encoding=UTF-8&orgId=00DdL00000ZaM7V"
      method="POST">

    <input type="hidden" name="orgid" value="00DdL00000ZaM7V">

    <input type="hidden"
           name="retURL"
           value="https://chaitalidhande25.github.io/DMS-/ThankYou.html">

    <!-- Optional debugging -->
    <!--
    <input type="hidden" name="debug" value="1">
    <input type="hidden" name="debugEmail" value="chaitalidhande25@gmail.com">
    -->

    <label for="name">Contact Name</label>
    <input id="name" maxlength="80" name="name" size="20" type="text">
    <br><br>

    <label for="email">Email</label>
    <input id="email" maxlength="80" name="email" size="20" type="text">
    <br><br>

    <label for="phone">Phone</label>
    <input id="phone" maxlength="40" name="phone" size="20" type="text">
    <br><br>

    <label for="priority">Priority</label>
    <select id="priority" name="priority">
        <option value="">--None--</option>
        <option value="High">High</option>
        <option value="Medium">Medium</option>
        <option value="Low">Low</option>
    </select>
    <br><br>

    <label for="reason">Case Reason</label>
    <select id="reason" name="reason">
        <option value="">--None--</option>
        <option value="Defective Product">Defective Product</option>
        <option value="Sizing Issues">Sizing Issues</option>
        <option value="Order Not Received">Order Not Received</option>
        <option value="Wrong Item Received">Wrong Item Received</option>
        <option value="Damaged Item Upon Arrival">Damaged Item Upon Arrival</option>
        <option value="Feedback">Feedback</option>
        <option value="Other">Other</option>
        <option value="Delayed Shipment">Delayed Shipment</option>
        <option value="Lost Package">Lost Package</option>
        <option value="Return Request">Return Request</option>
        <option value="Exchange Request">Exchange Request</option>
        <option value="Refund Processing">Refund Processing</option>
        <option value="Warranty Claim">Warranty Claim</option>
        <option value="Shoe Repair Request">Shoe Repair Request</option>
        <option value="Incorrect Charge">Incorrect Charge</option>
        <option value="Refund Not Received">Refund Not Received</option>
        <option value="Gift Card or Store Credit Issue">Gift Card or Store Credit Issue</option>
        <option value="Discount Code Not Working">Discount Code Not Working</option>
        <option value="Loyalty Points Missing">Loyalty Points Missing</option>
        <option value="Rewards Redemption Issues">Rewards Redemption Issues</option>
        <option value="Personalized Shoe Inquiry">Personalized Shoe Inquiry</option>
        <option value="Bulk or Corporate Orders">Bulk or Corporate Orders</option>
        <option value="In-Store Purchase Issue">In-Store Purchase Issue</option>
        <option value="Store Availability Inquiry">Store Availability Inquiry</option>
        <option value="Curbside Pickup Issues">Curbside Pickup Issues</option>
        <option value="Service Complaint">Service Complaint</option>
        <option value="Website/App Usability Issues">Website/App Usability Issues</option>
    </select>
    <br><br>

    <label for="subject">Subject</label>
    <input id="subject" maxlength="80" name="subject" size="20" type="text">
    <br><br>

    <label for="description">Description</label>
    <textarea id="description" name="description"></textarea>
    <br><br>

    <input type="hidden" id="external" name="external" value="1">

    <input type="submit" value="Submit Case">

</form>

</body>
</html>
