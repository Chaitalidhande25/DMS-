<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-type" content="text/html; charset=UTF-8">

<title>DMS Dealer Support</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#e8edf3;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:30px;
}

.card{
    width:720px;
    background:#fff;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 4px 18px rgba(0,0,0,.15);
}

.header{
    background:#163d6b;
    color:#fff;
    padding:20px;
    display:flex;
    align-items:center;
    gap:14px;
}

.logo{
    width:42px;
    height:42px;
    border-radius:8px;
    background:#ff9800;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    font-size:20px;
}

.header h2{
    font-size:22px;
}

.header p{
    font-size:13px;
    opacity:.9;
    margin-top:4px;
}

.form-body{
    padding:28px;
}

.section-title{
    margin:18px 0 10px;
    font-size:13px;
    font-weight:bold;
    color:#163d6b;
    text-transform:uppercase;
}

.row{
    display:flex;
    gap:16px;
    margin-bottom:16px;
}

.col{
    flex:1;
}

label{
    display:block;
    margin-bottom:6px;
    font-size:13px;
    font-weight:bold;
}

input,
select,
textarea{
    width:100%;
    padding:11px;
    border:1px solid #ccd3db;
    border-radius:6px;
    font-size:14px;
}

textarea{
    min-height:120px;
    resize:vertical;
}

button{
    width:100%;
    margin-top:22px;
    background:#163d6b;
    color:white;
    border:none;
    padding:14px;
    border-radius:6px;
    cursor:pointer;
    font-size:15px;
    font-weight:bold;
}

button:hover{
    background:#0f2f54;
}

.footer{
    text-align:center;
    color:#666;
    font-size:12px;
    margin-top:18px;
}
</style>

</head>

<body>

<div class="card">

    <div class="header">
        <div class="logo">D</div>

        <div>
            <h2>DMS Dealer Support</h2>
            <p>Submit your support request and our team will respond shortly.</p>
        </div>
    </div>

    <div class="form-body">

        <!-- Replace the action/orgid with your own generated Web-to-Case values -->
        <form action="YOUR_WEB_TO_CASE_URL" method="POST">

            <input type="hidden" name="orgid" value="YOUR_ORG_ID">
            <input type="hidden" name="retURL" value="https://www.google.com">
            <input type="hidden" name="external" value="1">

            <div class="section-title">Your Details</div>

            <div class="row">
                <div class="col">
                    <label>Contact Name</label>
                    <input type="text" name="name" placeholder="John Roy">
                </div>

                <div class="col">
                    <label>Email Address</label>
                    <input type="email" name="email" placeholder="dealer@example.com">
                </div>
            </div>

            <div class="row">
                <div class="col">
                    <label>Phone Number</label>
                    <input type="text" name="phone" placeholder="+91 9876543210">
                </div>
            </div>

            <div class="section-title">Case Details</div>

            <div class="row">
                <div class="col">
                    <label>Subject</label>
                    <input type="text" name="subject" placeholder="Brief description">
                </div>
            </div>

            <div class="row">
                <div class="col">
                    <label>Case Reason</label>
                    <select name="reason">
                        <option value="">-- Select Reason --</option>
                        <option>Warranty Claim</option>
                        <option>Defective Product</option>
                        <option>Return Request</option>
                        <option>Order Not Received</option>
                        <option>Damaged Item</option>
                        <option>Other</option>
                    </select>
                </div>

                <div class="col">
                    <label>Priority</label>
                    <select name="priority">
                        <option value="">-- Select Priority --</option>
                        <option>High</option>
                        <option>Medium</option>
                        <option>Low</option>
                    </select>
                </div>
            </div>

            <label>Description</label>
            <textarea name="description"
                placeholder="Please describe the issue with relevant details..."></textarea>

            <button type="submit">
                Submit Case
            </button>

        </form>

        <div class="footer">
            Dealer Management System • Customer Support Portal
        </div>

    </div>

</div>

</body>
</html>
