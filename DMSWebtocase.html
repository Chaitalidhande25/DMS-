
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DMS Dealer Support</title>

<style>
*{
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    margin:0;
    background:#eef2f7;
    padding:40px 20px;
}

.container{
    max-width:850px;
    margin:auto;
    background:#fff;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 4px 18px rgba(0,0,0,.12);
}

.header{
    background:#173b67;
    color:#fff;
    display:flex;
    align-items:center;
    padding:20px 24px;
}

.logo{
    width:38px;
    height:38px;
    background:#f5a623;
    border-radius:6px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    margin-right:14px;
}

.header h2{
    margin:0;
    font-size:30px;
}

.header p{
    margin:4px 0 0;
    font-size:14px;
}

.content{
    padding:28px;
}

.section-title{
    font-size:14px;
    font-weight:bold;
    color:#173b67;
    margin-top:10px;
    margin-bottom:18px;
    border-bottom:1px solid #dcdcdc;
    padding-bottom:8px;
}

.row{
    display:flex;
    gap:16px;
    margin-bottom:18px;
}

.col{
    flex:1;
}

.full{
    width:100%;
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:6px;
    font-size:14px;
    font-weight:bold;
}

input,
select,
textarea{
    width:100%;
    padding:11px;
    border:1px solid #cfd6df;
    border-radius:4px;
    font-size:14px;
}

textarea{
    min-height:130px;
    resize:vertical;
}

button{
    width:100%;
    background:#173b67;
    color:#fff;
    border:none;
    padding:14px;
    border-radius:4px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#0f2e52;
}

.note{
    text-align:center;
    color:#888;
    font-size:13px;
    margin-top:18px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<div class="logo">D</div>

<div>
<h2>DMS Dealer Support</h2>
<p>Submit a support case — our team will respond promptly.</p>
</div>
</div>

<div class="content">

<form action="https://webto.salesforce.com/servlet/servlet.WebToCase?encoding=UTF-8&orgId=00DdL00000ZaM7V"
method="POST">

<input type="hidden" name="orgid" value="00DdL00000ZaM7V">

<input type="hidden"
name="retURL"
value="https://chaitalidhande25.github.io/DMS-/ThankYou.html">

<input type="hidden" name="external" value="1">

<div class="section-title">
YOUR DETAILS
</div>

<div class="row">

<div class="col">
<label>Contact Name *</label>
<input id="name" name="name" maxlength="80" type="text" required>
</div>
</div>

<div class="col">
<label>Phone Number</label>
<input id="phone" name="phone" maxlength="80" type="text">

</div>

<div class="Full">
<label>Email Address *</label>
<input id="email" name="email" maxlength="40" type="email" required>
</div>

<div class="section-title">
CASE DETAILS


<div class="row">

<div class="col">
<label>Case Reason *</label>
<select id="reason" name="reason" required>
<option value="">-- Select Reason --</option>
<option value="Defective Product">Defective Product</option>
<option value="Order Not Received">Order Not Received</option>
<option value="Wrong Item Received">Wrong Item Received</option>
<option value="Return Request">Return Request</option>
<option value="Exchange Request">Exchange Request</option>
<option value="Warranty Claim">Warranty Claim</option>
<option value="Refund Processing">Refund Processing</option>
<option value="Other">Other</option>
</select>
</div>

<div class="col">
<label>Priority *</label>
<select id="priority" name="priority" required>
<option value="">-- Select Priority --</option>
<option value="High">High</option>
<option value="Medium">Medium</option>
<option value="Low">Low</option>
</select>
</div>
</div>

<div class="full">
<label>Subject *</label>
<input id="subject" name="subject" maxlength="80" type="text" required>
</div>

</div>

<div class="full">
<label>Description *</label>
<textarea id="description" name="description" required></textarea>
</div>

<button type="submit">
Submit Case →
</button>

<div class="note">
Our support team will respond as soon as possible.
</div>

</form>

</div>

</div>

</body>
</html>
