
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | DMS Dealer Support</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #eef2f7;
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: #ffffff;
            width: 500px;
            padding: 40px;
            text-align: center;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }

        .icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: #28a745;
            color: white;
            border-radius: 50%;
            font-size: 48px;
            line-height: 80px;
            font-weight: bold;
        }

        h1 {
            color: #163d6b;
            margin-bottom: 10px;
        }

        p {
            color: #555;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .button {
            display: inline-block;
            background: #163d6b;
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: bold;
        }

        .button:hover {
            background: #0f2f54;
        }

        .footer {
            margin-top: 25px;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>

<body>

    <div class="card">

        <div class="icon">✓</div>

        <h1>Thank You!</h1>

        <p>
            Your support request has been submitted successfully.
            Our Dealer Management System team will review your case
            and contact you as soon as possible.
        </p>

        <a href="index.html" class="button">
            Back to Support Portal
        </a>

        <div class="footer">
            © 2026 Dealer Management System | Customer Support
        </div>

    </div>

</body>
</html>
